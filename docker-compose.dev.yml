services:
  # ==================== MySQL ====================
  mysql:
    image: mysql:8.0
    container_name: waoowaoo-mysql-dev
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: waoowaoo123
      MYSQL_DATABASE: waoowaoo
      MYSQL_ROOT_HOST: "%"
    ports:
      - "13306:3306"
    volumes:
      - mysql_data_dev:/var/lib/mysql
    command:
      - "--default-authentication-plugin=mysql_native_password"
      - "--sql_mode=STRICT_TRANS_TABLES,NO_ENGINE_SUBSTITUTION"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -pwaoowaoo123"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 15s

  # ==================== Redis ====================
  redis:
    image: redis:7-alpine
    container_name: waoowaoo-redis-dev
    restart: unless-stopped
    ports:
      - "16379:6379"
    volumes:
      - redis_data_dev:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 5s

  # ==================== App (Next.js + Workers) - DEV MODE ====================
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: waoowaoo-app-dev
    restart: unless-stopped
    environment:
      # Database (points to container internal MySQL, use service name mysql instead of localhost)
      DATABASE_URL: "mysql://root:waoowaoo123@mysql:3306/waoowaoo"
      # Redis (points to container internal Redis, use service name redis)
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_USERNAME: ""
      REDIS_PASSWORD: ""
      REDIS_TLS: ""
      # Storage: default local storage
      STORAGE_TYPE: local
      # Authentication
      NEXTAUTH_URL: "http://localhost:13000"
      NEXTAUTH_SECRET: "waoowaoo-dev-secret-2026"
      # Internal secrets
      CRON_SECRET: "waoowaoo-dev-cron-secret"
      INTERNAL_TASK_TOKEN: "waoowaoo-dev-task-token"
      API_ENCRYPTION_KEY: "waoowaoo-dev-encryption-key"
      # Worker configuration
      WATCHDOG_INTERVAL_MS: "30000"
      TASK_HEARTBEAT_TIMEOUT_MS: "90000"
      QUEUE_CONCURRENCY_IMAGE: "50"
      QUEUE_CONCURRENCY_VIDEO: "50"
      QUEUE_CONCURRENCY_VOICE: "20"
      QUEUE_CONCURRENCY_TEXT: "50"
      # Bull Board
      BULL_BOARD_HOST: "0.0.0.0"
      BULL_BOARD_PORT: "3010"
      BULL_BOARD_BASE_PATH: "/admin/queues"
      BULL_BOARD_USER: ""
      BULL_BOARD_PASSWORD: ""
      # Logging
      LOG_UNIFIED_ENABLED: "true"
      LOG_LEVEL: "INFO"
      LOG_FORMAT: "json"
      LOG_DEBUG_ENABLED: "false"
      LOG_AUDIT_ENABLED: "true"
      LOG_SERVICE: "waoowaoo"
      LOG_REDACT_KEYS: "password,token,apiKey,apikey,authorization,cookie,secret,access_token,refresh_token"
      # Billing
      BILLING_MODE: "OFF"
      # Streaming
      LLM_STREAM_EPHEMERAL_ENABLED: "true"
      # Node options for dev
      NODE_OPTIONS: "--no-deprecation"
    ports:
      - "13000:3000"
      - "13010:3010"
    volumes:
      # Mount source code for live reload
      - ./src:/app/src:ro
      - ./prisma:/app/prisma:ro
      - ./lib:/app/lib:ro
      - ./scripts:/app/scripts:ro
      - ./messages:/app/messages:ro
      - ./standards:/app/standards:ro
      - ./public:/app/public:ro
      - ./next.config.ts:/app/next.config.ts:ro
      - ./middleware.ts:/app/middleware.ts:ro
      - ./postcss.config.mjs:/app/postcss.config.mjs:ro
      - ./tsconfig.json:/app/tsconfig.json:ro
      # Data and logs (writable)
      - ./data:/app/data
      - ./docker-logs:/app/logs
      # Node modules (installed in container, not mounted - faster)
      # Next.js cache (for faster rebuilds)
      - next_cache_dev:/app/.next
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "
        echo '🔧 Running Prisma generate...' &&
        npx prisma generate &&
        echo '🔧 Running Prisma db push...' &&
        npx prisma db push --skip-generate &&
        echo '' &&
        echo '╔══════════════════════════════════════════════════╗' &&
        echo '║     waoowaoo DEV MODE (Live Reload Enabled)      ║' &&
        echo '║                                                  ║' &&
        echo '║  Frontend:  http://localhost:13000                  ║' &&
        echo '║  Queue UI:  http://localhost:13010/admin/queues  ║' &&
        echo '║                                                  ║' &&
        echo '║  ✨ Code changes will auto-reload!                 ║' &&
        echo '╚══════════════════════════════════════════════════╝' &&
        echo '' &&
        npm run dev
      "

volumes:
  mysql_data_dev:
  redis_data_dev:
  next_cache_dev:
